name: CI

on:
  push:
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API Build and Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      # Dependabot PRs cannot read repo Actions secrets by default.
      # Keep CI runnable by falling back to local service credentials.
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgresql://set_user:set_pass@localhost:5432/set_db?schema=public' }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN != '' && secrets.ADMIN_TOKEN || 'dev-admin-123' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: set_user
          POSTGRES_PASSWORD: set_pass
          POSTGRES_DB: set_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U set_user -d set_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Apply Prisma Migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Build API
        run: pnpm --filter api build

      - name: Run API Unit Tests
        run: pnpm --filter api test --runInBand

      - name: Run API E2E Tests
        run: pnpm --filter api test:e2e --runInBand
